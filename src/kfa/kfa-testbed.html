<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KFA Testbed</title>
    <style>
        /* ── KF Design System tokens (mirrors example-form.html Style B) ── */
        /* Remove on transliteration to WF */
        :root {
            --_color-primary---forest--forest-950:       #00634f;
            --_color-primary---utility--light-gray:      #dad8d6;
            --_color-primary---neutral--neutral-200:     #e5e7eb;
            --_color-emerald---emerald--emerald-950:     #05c690;
            --_typography-colors--text-base:             #053328;
            --_inputs--forms--input-label:               #8c8c8c;
            --_components---input--font-size:            1.125rem;
            --_components---input--line-height:          1.5em;
            --_components---input--font-weight:          400;
            --_components---input-label--font-size:      14px;
            --_components---input-label--font-weight:    500;
            --_fonts--primary-font:                      Gotham;
        }

        /* ── Reset / base ── */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: var(--korn-ferry-mast-library---fonts--primary-font, var(--_fonts--primary-font, Gotham)), Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Form panel ── */
        #kfaRegForm {
            max-width: 540px;
            background: #fff;
            padding: 2rem;
            border: 1px solid var(--korn-ferry-mast-library_color-primary---utility--light-gray, var(--_color-primary---utility--light-gray, #dad8d6));
        }

        #kfaRegForm > legend {
            font-size: .75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #888;
            margin-bottom: 1.5rem;
        }

        /* ── Name row: two columns ── */
        .kfa-name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 0;
        }

        @media (max-width: 480px) {
            .kfa-name-row { grid-template-columns: 1fr; gap: 0; }
        }

        /* ── Generic field wrapper ── */
        .kfa-field {
            display: flex;
            flex-direction: column;
            gap: .25rem;
            margin-bottom: 1.25rem;
        }

        /* ── Field labels — Style B: forest green, no uppercase ── */
        .kfa-field label,
        .kfa-field > legend {
            font-family: var(--korn-ferry-mast-library---fonts--primary-font, var(--_fonts--primary-font, Gotham)), Arial, sans-serif;
            font-size: var(--korn-ferry-mast-library_components---input-label--font-size, var(--_components---input-label--font-size, 14px));
            font-weight: var(--korn-ferry-mast-library_components---input-label--font-weight, var(--_components---input-label--font-weight, 500));
            color: var(--korn-ferry-mast-library_color-primary---forest--forest-950, var(--_color-primary---forest--forest-950, #00634f));
            line-height: 32px;
            letter-spacing: -0.28px;
            text-transform: none;
            margin-bottom: 0;
        }

        /* ── Text / email / password inputs ── */
        .kfa-field input[type="text"],
        .kfa-field input[type="email"],
        .kfa-field input[type="password"] {
            font-family: var(--korn-ferry-mast-library---fonts--primary-font, var(--_fonts--primary-font, Gotham)), Arial, sans-serif;
            font-size: var(--korn-ferry-mast-library_components---input--font-size, var(--_components---input--font-size, 1.125rem));
            font-weight: var(--korn-ferry-mast-library_components---input--font-weight, var(--_components---input--font-weight, 400));
            line-height: var(--korn-ferry-mast-library_components---input--line-height, var(--_components---input--line-height, 1.5em));
            padding: 1rem;
            border: 1px solid var(--korn-ferry-mast-library_color-primary---utility--light-gray, var(--_color-primary---utility--light-gray, #dad8d6));
            background-color: #fff;
            color: var(--korn-ferry-mast-library---typography-colors--text-base, var(--_typography-colors--text-base, #053328));
            width: 100%;
            appearance: none;
        }

        .kfa-field input::placeholder {
            color: var(--korn-ferry-mast-library---inputs--forms--input-label, var(--_inputs--forms--input-label, #8c8c8c));
        }

        .kfa-field input:focus {
            outline: none;
            border-color: var(--korn-ferry-mast-library_color-emerald---emerald--emerald-950, var(--_color-emerald---emerald--emerald-950, #05c690));
        }

        /* ── Password row (input + reveal toggle) ── */
        .kfa-pw-row {
            display: flex;
            align-items: center;
            border: 1px solid var(--korn-ferry-mast-library_color-primary---utility--light-gray, var(--_color-primary---utility--light-gray, #dad8d6));
        }

        .kfa-pw-row input {
            flex: 1;
            padding: 1rem;
            border: none;
            font-family: var(--korn-ferry-mast-library---fonts--primary-font, var(--_fonts--primary-font, Gotham)), Arial, sans-serif;
            font-size: var(--korn-ferry-mast-library_components---input--font-size, var(--_components---input--font-size, 1.125rem));
            color: var(--korn-ferry-mast-library---typography-colors--text-base, var(--_typography-colors--text-base, #053328));
            background: #fff;
        }

        .kfa-pw-row input:focus { outline: none; }

        .kfa-pw-row:focus-within {
            border-color: var(--korn-ferry-mast-library_color-emerald---emerald--emerald-950, var(--_color-emerald---emerald--emerald-950, #05c690));
        }

        #kfaPwReveal {
            padding: 0 1rem;
            cursor: pointer;
            font-size: var(--korn-ferry-mast-library_components---input-label--font-size, var(--_components---input-label--font-size, 14px));
            color: var(--korn-ferry-mast-library_color-primary---forest--forest-950, var(--_color-primary---forest--forest-950, #00634f));
            user-select: none;
            white-space: nowrap;
        }

        #kfaPwMeter {
            width: 100%;
            height: 4px;
        }

        /* ── Divider ── */
        .kfa-divider {
            border: none;
            border-top: 1px solid var(--korn-ferry-mast-library_color-primary---neutral--neutral-200, var(--_color-primary---neutral--neutral-200, #e5e7eb));
            margin: 1.5rem 0;
        }

        /* ── Account type toggle (radio) ── */
        .kfa-toggle-track {
            display: flex;
            border: 1px solid var(--korn-ferry-mast-library_color-primary---utility--light-gray, var(--_color-primary---utility--light-gray, #dad8d6));
            background: var(--korn-ferry-mast-library_color-primary---utility--light-gray, var(--_color-primary---utility--light-gray, #dad8d6));
            overflow: hidden;
        }

        .kfa-toggle-track label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            cursor: pointer;
            font-size: var(--korn-ferry-mast-library_components---input--font-size, var(--_components---input--font-size, 1.125rem));
            font-weight: 700;
            color: rgba(0, 0, 0, .5);
            background: var(--korn-ferry-mast-library_color-primary---utility--light-gray, var(--_color-primary---utility--light-gray, #dad8d6));
            transition: background .15s, color .15s;
        }

        .kfa-toggle-track input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* Highlight checked option via sibling combinator */
        #toggleFree:checked  ~ label[for="toggleFree"],
        #togglePaid:checked  ~ label[for="togglePaid"] {
            background: var(--korn-ferry-mast-library_color-primary---forest--forest-950, var(--_color-primary---forest--forest-950, #00634f));
            color: #fff;
        }

        /* ── Hidden real checkboxes ── */
        .kfa-hidden-cb {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* ── Custom checkbox box ── */
        .kfa-cb-row {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            cursor: pointer;
        }

        [role="checkbox"] {
            display: inline-block;
            width: 1em;
            height: 1em;
            border: 2px solid var(--korn-ferry-mast-library---inputs--forms--input-label, var(--_inputs--forms--input-label, #8c8c8c));
            background: transparent;
            flex-shrink: 0;
            margin-top: .15em;
            font-size: 13px;
        }

        [role="checkbox"][aria-checked="true"] {
            background: var(--korn-ferry-mast-library_color-emerald---emerald--emerald-950, var(--_color-emerald---emerald--emerald-950, #05c690));
            border-color: var(--korn-ferry-mast-library_color-emerald---emerald--emerald-950, var(--_color-emerald---emerald--emerald-950, #05c690));
        }

        /* ── Checkbox / consent label text ── */
        .kfa-cb-label {
            font-size: 14px;
            font-style: normal;
            font-weight: 400;
            line-height: 150%;
            color: var(--korn-ferry-mast-library---typography-colors--text-base, var(--_typography-colors--text-base, #053328));
        }

        /* Links — underline with emerald decoration (Style B) */
        .kfa-cb-label a {
            color: var(--korn-ferry-mast-library---typography-colors--text-base, var(--_typography-colors--text-base, #053328));
            text-decoration-line: underline;
            text-decoration-style: solid;
            text-decoration-color: var(--korn-ferry-mast-library_color-emerald---emerald--emerald-950, var(--_color-emerald---emerald--emerald-950, #05c690));
            text-decoration-thickness: 10%;
            text-underline-offset: auto;
        }

        /* Marketing opt-in: border-top separator (Style B pattern) */
        .kfa-field:has(#kfaMarketing) {
            border-top: 1px solid var(--korn-ferry-mast-library_color-primary---neutral--neutral-200, var(--_color-primary---neutral--neutral-200, #e5e7eb));
            padding-top: 1.5rem;
            margin-top: .5rem;
        }

        /* ── Inline field messages ── */
        .kfa-msg {
            font-size: .8rem;
            color: #c00;
            min-height: 1em;
        }

        /* ── Submit row ── */
        .kfa-submit-row {
            padding-top: 3rem;
        }

        #kfaSubmit {
            display: block;
            width: 100%;
            background: var(--korn-ferry-mast-library_color-primary---forest--forest-950, var(--_color-primary---forest--forest-950, #00634f));
            color: #fff;
            border: none;
            font-family: var(--korn-ferry-mast-library---fonts--primary-font, var(--_fonts--primary-font, Gotham)), Arial, sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 1.25rem;
            cursor: not-allowed;
            opacity: .5;
        }

        #kfaSubmit:not([disabled]) {
            cursor: pointer;
            opacity: 1;
        }

        #kfaLoading {
            display: block;
            font-size: .85rem;
            color: #555;
            min-height: 1em;
            margin-top: .5rem;
        }

        /* ── Status / error banners ── */
        #kfaError, #kfaStatus {
            margin-top: 1rem;
            padding: .6rem .8rem;
            font-size: .9rem;
            display: none;
        }

        #kfaError { background: #fee; border: 1px solid #c00; color: #900; }
        #kfaStatus { background: #eff; border: 1px solid #3a7; color: #265; }
    </style>
</head>
<body>

<main>
    <form id="kfaRegForm" method="post" action="/" novalidate>
        <legend>KFA Registration — Testbed</legend>

        <!-- ── Name (side by side) ── -->
        <div class="kfa-name-row">
            <div class="kfa-field">
                <label for="kfaFirstName">First Name</label>
                <input type="text" id="kfaFirstName" name="firstName" placeholder="Jane" required>
            </div>
            <div class="kfa-field">
                <label for="kfaLastName">Last Name</label>
                <input type="text" id="kfaLastName" name="lastName" placeholder="Smith" required>
            </div>
        </div>
        <span id="kfaMsgName" class="kfa-msg" aria-live="polite"></span>

        <!-- ── Email ── -->
        <div class="kfa-field">
            <label for="kfaEmail">Email Address</label>
            <input type="email" id="kfaEmail" name="email" placeholder="jane@example.com" required>
            <span id="kfaMsgEmail" class="kfa-msg" aria-live="polite"></span>
        </div>

        <!-- ── Password ── -->
        <div class="kfa-field">
            <label for="kfaPassword">Password</label>
            <div class="kfa-pw-row">
                <input type="password" id="kfaPassword" name="password" placeholder="Create a password" required>
                <span id="kfaPwReveal">Show</span>
            </div>
            <meter id="kfaPwMeter" min="0" max="4" value="0"></meter>
            <span id="kfaMsgPassword" class="kfa-msg" aria-live="polite"></span>
        </div>

        <hr class="kfa-divider">

        <!-- ── Account Type (before agreements) ── -->
        <div class="kfa-field">
            <label>Account Type</label>
            <div class="kfa-toggle-track">
                <input type="radio" id="toggleFree" name="regType" value="free" checked>
                <label for="toggleFree">Free</label>
                <input type="radio" id="togglePaid" name="regType" value="paid">
                <label for="togglePaid">Premium</label>
            </div>
        </div>

        <hr class="kfa-divider">

        <!-- ── Agreements ── -->
        <fieldset style="border:none; padding:0; margin:0 0 1rem;">
            <legend style="font-size:.875rem; font-weight:600; color:#00634f; margin-bottom:.75rem;">Agreements</legend>

            <!-- Privacy (required) -->
            <div class="kfa-field">
                <div class="kfa-cb-row">
                    <input type="checkbox" id="kfaPrivacy" name="privacy" class="kfa-hidden-cb" required>
                    <span id="kfaPrivacyCustom" role="checkbox" aria-checked="false" tabindex="0" aria-labelledby="kfaPrivacyLabel"></span>
                    <span id="kfaPrivacyLabel" class="kfa-cb-label">
                        I agree to the <a href="#">Global Privacy Policy</a> (required)
                    </span>
                </div>
                <span id="kfaMsgPrivacy" class="kfa-msg" aria-live="polite"></span>
            </div>

            <!-- Marketing (optional) -->
            <div class="kfa-field">
                <div class="kfa-cb-row">
                    <input type="checkbox" id="kfaMarketing" name="marketing" class="kfa-hidden-cb">
                    <span id="kfaMarketingCustom" role="checkbox" aria-checked="false" tabindex="0" aria-labelledby="kfaMarketingLabel"></span>
                    <span id="kfaMarketingLabel" class="kfa-cb-label">
                        I would like to receive emails from Korn Ferry Advance with career tips, offers and advice.
                    </span>
                </div>
            </div>
        </fieldset>

        <!-- ── Submit ── -->
        <div class="kfa-submit-row">
            <button type="submit" id="kfaSubmit" disabled aria-disabled="true">Start Advancing</button>
            <span id="kfaLoading"></span>
        </div>

        <!-- ── Banners ── -->
        <div id="kfaError" role="alert" aria-live="assertive"></div>
        <div id="kfaStatus" role="status" aria-live="polite"></div>
    </form>
</main>

</body>
</html>
