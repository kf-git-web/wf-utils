<noscript> You need to enable JavaScript to run this app. </noscript>
<form class="cludo-input-form" role="search" id="cludo-search-input">
  <input
          class="cludo-input-form__input"
          title="Search the page"
          name="searchrequest"
          type="search"
          autocomplete="off"
          placeholder="Type your search"
          aria-autocomplete="list"
          aria-haspopup="true"
  />
  <button
          type="submit"
          title="Search"
          aria-label="Search"
          class="cludo-input-form__search-button"
  >
    Search
  </button>
</form>
<div id="cludo-search-results" class="cludo-search-results">
  <div class="cludo-search-results__layout">
    <div
            class="cludo-search-results__facets search-filters cludo-search-controls"
            aria-controls="search-results"
    ></div>
    <div class="cludo-search-results__results-wrapper">
      <div
              class="cludo-search-results__results search-results"
              role="region"
              id="search-results"
              aria-live="polite"
              aria-label="Search results"
      ></div>
    </div>
  </div>
</div>
<script>
  window.cludoConfig = {
    /** Required properties ~ */
    customerId: 10000903,
    engineId: 10003006,
    language: "en", //Change this to reflect the language of the search
    searchUrl: "/insights-directory", //Search URL - change this to reflect the actual search URL
    searchInputSelectors: ["#cludo-search-input"], //Array of CSS selectors for input fields that should trigger search

    /** Optional properties ~ */
    behavior: {
      allowSearchWithoutSearchword: true,
    },
    facets: {
      keys: ["Category", "Capabilities"],
    },
    facetOptions: {
      customOrder: {
        Category: [
          "KF Insights",
          "Consultant",
          "Page",
        ],
      },
    },
  };
</script>
