<div data-enable-form="{{wf {&quot;path&quot;:&quot;include-marketo-form&quot;,&quot;type&quot;:&quot;Bool&quot;\} }}" id="mktoform" data-video-target="#gatedVideo" data-kf-mktoform="{{wf {&quot;path&quot;:&quot;marketo-form-id&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}" class="kf-mktoform"></div>
<script>
    /*
     * KF ReadyQueue + Events and Webinars Form Loader
     *
     * Expects a container like:
     *   <div id="events-and-webinars-form"
     *        data-kf-mktoform="1234"
     *        data-enable-form="true"
     *        data-video-target="#thankyouVideo">  <!-- optional: CSS selector for a video block to reveal on success -->
     *   </div>
     *
     * Video show/hide behavior
     * - On successful submit, we HIDE the form and SHOW a target video element.
     * - Supported targets:
     *     - If data-video-target is set: we query that selector globally.
     *     - Else we look for a descendant with [data-kf-video].
     * - If the target contains an <iframe> with data-src, we lazy-load by moving
     *   data-src -> src at show-time. If data-autoplay is present on the iframe,
     *   we append autoplay params for common providers (YouTube/Vimeo) when possible.
     *
     * IMPORTANT: This OVERRIDES Marketo's follow-up page behavior.
     * - We always return false in onSuccess(), canceling followUpUrl redirects.
     */
    (function () {
        const Q = (window.__readyQueue = window.__readyQueue || []);

        Q.push({
            name: "eventsWebinarsFormLoader",
            fn: function () {
                const container = document.getElementById('events-and-webinars-form');
                if (!container) {
                    console.warn('[mktoform] #events-and-webinars-form not found. Abort.');
                    return;
                }

                // Only run when explicitly enabled
                const enabled = container.getAttribute('data-enable-form');
                if (!enabled || enabled.toLowerCase() !== 'true') {
                    console.debug('[mktoform] data-enable-form is not true; skipping.');
                    return;
                }

                if (container.__kfMktoInit) {
                    console.debug('[mktoform] already initialized; skipping.');
                    return;
                }
                container.__kfMktoInit = true;

                const formIdAttr = container.getAttribute('data-kf-mktoform');
                const formId = formIdAttr && String(formIdAttr).trim();
                if (!formId || !/^\d+$/.test(formId)) {
                    console.error('[mktoform] data-kf-mktoform missing or not an integer.');
                    return;
                }

                // Hardcoded Marketo details
                const munchkin = '251-OLR-958';
                const instance = '//discover.kornferry.com';

                // Ensure a target <form> exists so Mkto renders where we want.
                const targetFormId = 'mktoForm_' + formId;
                let existing = container.querySelector('#' + CSS.escape(targetFormId));
                if (!existing) {
                    const f = document.createElement('form');
                    f.id = targetFormId;
                    container.appendChild(f);
                }

                // --- tiny dom helpers ---
                function hide(el) {
                    if (!el) return;
                    el.setAttribute('hidden', '');
                    el.style.display = 'none';
                    el.classList.add('hidden');
                }

                function show(el) {
                    if (!el) return;
                    el.removeAttribute('hidden');
                    el.style.removeProperty('display');
                    el.classList.remove('hidden');
                }

                function findVideoTarget() {
                    const sel = container.getAttribute('data-video-target');
                    const el = sel ? document.querySelector(sel) : container.querySelector('[data-kf-video]');
                    return el || null;
                }

                function enableAutoplayParams(url) {
                    try {
                        const u = new URL(url, window.location.origin);
                        const host = u.hostname.toLowerCase();
                        if (host.includes('youtube.com') || host.includes('youtu.be')) {
                            if (!u.searchParams.has('autoplay')) u.searchParams.set('autoplay', '1');
                            if (!u.searchParams.has('mute')) u.searchParams.set('mute', '1');
                            if (!u.searchParams.has('playsinline')) u.searchParams.set('playsinline', '1');
                        } else if (host.includes('vimeo.com')) {
                            if (!u.searchParams.has('autoplay')) u.searchParams.set('autoplay', '1');
                            if (!u.searchParams.has('muted')) u.searchParams.set('muted', '1');
                            if (!u.searchParams.has('playsinline')) u.searchParams.set('playsinline', '1');
                        }
                        return u.toString();
                    } catch (e) {
                        return url;
                    }
                }

                function showVideoAndHideForm() {
                    const formEl = container.querySelector('#' + CSS.escape(targetFormId));
                    const videoWrap = findVideoTarget();

                    if (videoWrap) {
                        // Lazy-load iframe if present
                        const iframe = videoWrap.querySelector('iframe');
                        if (iframe) {
                            const src = iframe.getAttribute('src');
                            const dataSrc = iframe.getAttribute('data-src');
                            if (!src && dataSrc) {
                                const finalSrc = iframe.hasAttribute('data-autoplay') ? enableAutoplayParams(dataSrc) : dataSrc;
                                iframe.setAttribute('src', finalSrc);
                            } else if (src && iframe.hasAttribute('data-autoplay')) {
                                iframe.setAttribute('src', enableAutoplayParams(src));
                            }
                        }
                        show(videoWrap);
                        container.classList.add('is-submitted');
                    }
                    hide(formEl);
                }

                function loadForm() {
                    if (!window.MktoForms2) {
                        console.error('[mktoform] MktoForms2 not found. Ensure Marketo Forms2 is preloaded.');
                        return;
                    }

                    try {
                        window.MktoForms2.loadForm(instance, munchkin, Number(formId), function (form) {
                            wireHooks(form);
                        });
                    } catch (e) {
                        console.error('[mktoform] loadForm threw', e);
                    }
                }

                function wireHooks(form) {
                    try {
                        const localVideo = container.querySelector('[data-kf-video]');
                        if (localVideo) hide(localVideo);

                        form.onValidate(function (isValid) {
                            console.debug('[mktoform] onValidate valid=%o', isValid);
                        });

                        form.onSuccess(function (values, followUpUrl) {
                            console.info('[mktoform] onSuccess (overriding followUpUrl) -> showing video, hiding form.', followUpUrl);
                            showVideoAndHideForm();
                            return false; // prevent redirect / default thank-you
                        });

                        container.__kfMkto = {
                            form: form,
                            dump: function () {
                                console.log('[mktoform] values', form.vals());
                            },
                            set: function (obj) {
                                form.setValues(obj);
                            },
                            submit: function () {
                                form.submit();
                            },
                            showVideo: showVideoAndHideForm
                        };

                        const formElem = form.getFormElem()[0];

                        // remove first <style> tag from form elem if found
                        const styleTag = formElem.querySelector('style');
                        if (styleTag) styleTag.remove();

                        // find button[type=submit] and restyle
                        const submitBtn = formElem.querySelector('button[type="submit"]');
                        if (submitBtn) {
                            submitBtn.classList.add('btn');
                        }

                        console.log('[mktoform] Form wired and ready (#%s).', formId);
                    } catch (e) {
                        console.error('[mktoform] wiring hooks failed', e);
                    }
                }

                // Marketo script must already be loaded globally
                loadForm();
            }
        });
    })();

</script>
