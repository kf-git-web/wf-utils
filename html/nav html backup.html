<script>
    // TODO: ADD TO READYQUEUE IN TOP SLOT
    // Menu centering script
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.querySelector('[data-js="container-width-target"]');
        if (!container) {
            console.warn('No container found for data‑js="container-width-target"');
            return;
        }

        function adjustDropdown(el) {
            const containerRect = container.getBoundingClientRect();
            const elRect        = el.getBoundingClientRect();
            const parentRect    = el.offsetParent?.getBoundingClientRect() || { left: 0 };

            // 1) If dropdown is over 85% of container width → fill & center on container
            if (elRect.width > containerRect.width * 0.85) {
                // clamp to full container width
                el.style.width = containerRect.width + 'px';

                // compute container center relative to dropdown’s offsetParent
                const containerCenter = containerRect.left + containerRect.width / 2;
                const leftOffset      = containerCenter - parentRect.left;

                // position at that center with translateX(-50%)
                el.style.left      = leftOffset + 'px';
                el.style.transform = 'translateX(-50%)';
                return;
            }

            // 2) Otherwise keep your original centering and only nudge if overflowing
            const overflowLeft  = containerRect.left  - elRect.left;    // >0 = hidden left
            const overflowRight = elRect.right - containerRect.right;  // >0 = hidden right
            let shiftX = 0;
            if (overflowLeft  > 0) shiftX = overflowLeft;
            if (overflowRight > 0) shiftX = -overflowRight;

            el.style.width     = '';
            el.style.left      = '50%';
            el.style.transform = `translateX(calc(-50% + ${shiftX}px))`;
        }

        const observerConfig = { attributes: true, attributeFilter: ['class'] };
        const dropdowns = document.querySelectorAll('[data-js="mainnav-dropdown-content"]');

        dropdowns.forEach(dropdown => {
            const mo = new MutationObserver(mutations => {
                mutations.forEach(({ target }) => {
                    const el = /** @type {HTMLElement} */(target);
                    // only adjust when open and on larger screens
                    if (el.classList.contains('w--open') && window.innerWidth > 991) {
                        adjustDropdown(el);
                    } else {
                        // reset styles when closed or on small screens
                        el.style.width     = '';
                        el.style.left      = '';
                        el.style.transform = '';
                    }
                });
            });
            mo.observe(dropdown, observerConfig);
        });

        // re‑apply on resize for any open dropdowns
        window.addEventListener('resize', () => {
            dropdowns.forEach(el => {
                if (el.classList.contains('w--open') && window.innerWidth > 991) {
                    adjustDropdown(el);
                } else {
                    el.style.width     = '';
                    el.style.left      = '';
                    el.style.transform = '';
                }
            });
        });
    });
</script>
